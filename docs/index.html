<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jobscraper — ofertas internacionales en AR/remoto</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1a1e24;
    --border: #242932;
    --text: #e8ecf1;
    --muted: #8b95a3;
    --accent: #7ab7ff;
    --accent-soft: rgba(122, 183, 255, 0.12);
    --ok: #7dd181;
    --warn: #f2c572;
    --err: #ef6e6e;
    --new: #d5a6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    font-size: 14px; line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .sub code { background: var(--panel); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  .stats { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; min-width: 100px; }
  .stat-n { font-size: 20px; font-weight: 600; }
  .stat-l { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }

  .controls { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr auto auto; gap: 10px; }
  .controls input, .controls select { background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; }
  .controls input:focus, .controls select:focus { outline: none; border-color: var(--accent); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; grid-column: 1 / -1; }
  .chip { background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 999px; font-size: 12px; cursor: pointer; }
  .chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 24px 0 10px; }

  .jobs { display: grid; gap: 10px; }
  .job { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; transition: border-color 0.1s; }
  .job:hover { border-color: var(--accent); }
  .job-head { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
  .job-title { font-size: 15px; font-weight: 500; }
  .job-title a { color: var(--text); }
  .job-title a:hover { color: var(--accent); text-decoration: none; }
  .job-new { background: var(--new); color: #1a1e24; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
    vertical-align: middle; margin-left: 8px; }
  .job-meta { color: var(--muted); font-size: 12px; margin-top: 4px; display: flex;
    gap: 10px; flex-wrap: wrap; }
  .job-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .job-src { background: var(--panel-2); padding: 2px 7px; border-radius: 4px; font-size: 11px;
    color: var(--muted); font-family: ui-monospace, monospace; }
  .job-desc { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.4;
    max-height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; }

  .watch { opacity: 0.92; }
  .watch .job-src { color: var(--warn); }

  .empty { text-align: center; color: var(--muted); padding: 40px; }
  .err { color: var(--err); font-size: 12px; }

  .footer { margin-top: 40px; color: var(--muted); font-size: 11px; text-align: center; }
  .footer a { color: var(--muted); }

  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr; }
    .job-head { flex-direction: column; gap: 6px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Jobscraper</h1>
  <div class="sub" id="subtitle">Ofertas internacionales en Argentina o con modalidad remota.</div>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <input id="q" type="search" placeholder="Buscar por título, org o ubicación…" autofocus>
    <select id="source"><option value="">Todas las fuentes</option></select>
    <select id="loc">
      <option value="all">AR + remoto</option>
      <option value="ar">Sólo Argentina</option>
      <option value="remote">Sólo remoto</option>
    </select>
    <div class="chips" id="sourceChips"></div>
  </div>

  <div class="section-title" id="jobsTitle">Ofertas</div>
  <div class="jobs" id="jobs"></div>

  <div class="section-title" id="watchesTitle" style="display:none">Páginas monitoreadas (sin ATS propio)</div>
  <div class="jobs" id="watches"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
const AR_RX = /argentina|buenos aires|baires/i;
const REMOTE_RX = /remot|home-based|home based|homebased|teletraba|telework|virtual|anywhere/i;

const state = {
  all: [],
  newSet: new Set(),
  q: "",
  src: "",
  locMode: "all",
};

async function load() {
  try {
    const r = await fetch("data.json?t=" + Date.now(), { cache: "no-cache" });
    const j = await r.json();
    state.all = j.jobs || [];
    state.newSet = new Set(j.new_fingerprints || []);
    document.getElementById("subtitle").innerHTML =
      `Ofertas internacionales en Argentina o con modalidad remota. ` +
      `Última corrida: <code>${formatDate(j.generated_at)}</code>. ` +
      `<a href="https://github.com/auparrino/jobscraper" target="_blank">repo</a>`;
    renderStats(j);
    populateSources();
    render();
  } catch (e) {
    document.getElementById("jobs").innerHTML =
      `<div class="empty err">No se pudo cargar data.json: ${e.message}</div>`;
  }
}

function formatDate(iso) {
  if (!iso) return "?";
  const d = new Date(iso);
  return d.toLocaleString("es-AR", { dateStyle: "medium", timeStyle: "short" });
}

function isWatch(j) { return j.source && j.source.startsWith("watch-"); }

function matchLocation(j) {
  const blob = [j.location, j.title, j.description, j.organization].filter(Boolean).join(" ");
  if (state.locMode === "ar") return AR_RX.test(blob);
  if (state.locMode === "remote") return REMOTE_RX.test(blob);
  return true;
}

function matchQuery(j) {
  if (!state.q) return true;
  const q = state.q.toLowerCase();
  return [j.title, j.location, j.organization, j.description]
    .filter(Boolean).some(v => v.toLowerCase().includes(q));
}

function matchSource(j) {
  if (!state.src) return true;
  return j.source === state.src;
}

function renderStats(payload) {
  const real = state.all.filter(j => !isWatch(j));
  const watches = state.all.filter(j => isWatch(j));
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-n">${real.length}</div><div class="stat-l">ofertas activas</div></div>
    <div class="stat"><div class="stat-n">${payload.new_count || 0}</div><div class="stat-l">nuevas este run</div></div>
    <div class="stat"><div class="stat-n">${watches.length}</div><div class="stat-l">páginas watched</div></div>
    <div class="stat"><div class="stat-n">${Object.keys(payload.errors || {}).length}</div><div class="stat-l">adapters con error</div></div>
  `;
}

function populateSources() {
  const counts = {};
  for (const j of state.all) {
    if (isWatch(j)) continue;
    counts[j.source] = (counts[j.source] || 0) + 1;
  }
  const sel = document.getElementById("source");
  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  for (const [src, n] of entries) {
    const opt = document.createElement("option");
    opt.value = src;
    opt.textContent = `${src} (${n})`;
    sel.appendChild(opt);
  }
}

function render() {
  const visible = state.all.filter(j => !isWatch(j))
    .filter(matchLocation).filter(matchQuery).filter(matchSource);
  const watches = state.all.filter(isWatch);

  document.getElementById("jobsTitle").textContent = `Ofertas (${visible.length})`;
  document.getElementById("jobs").innerHTML = visible.length
    ? visible.map(renderJob).join("")
    : `<div class="empty">Sin resultados con estos filtros.</div>`;

  const wt = document.getElementById("watchesTitle");
  const wd = document.getElementById("watches");
  if (state.src === "" && !state.q && state.locMode === "all" && watches.length) {
    wt.style.display = "";
    wd.innerHTML = watches.map(renderJob).join("");
  } else {
    wt.style.display = "none";
    wd.innerHTML = "";
  }
}

function escape(s) { return (s || "").replace(/[&<>"']/g,
  c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }

function renderJob(j) {
  const isNew = state.newSet.has(j.fingerprint);
  const watch = isWatch(j);
  const meta = [
    j.organization ? `<span>🏢 ${escape(j.organization)}</span>` : "",
    j.location ? `<span>📍 ${escape(j.location)}</span>` : "",
    j.posted_at ? `<span>📅 ${escape(j.posted_at)}</span>` : "",
    j.first_seen_at ? `<span>👁 visto ${formatDate(j.first_seen_at).split(",")[0]}</span>` : "",
  ].filter(Boolean).join("");
  return `
    <div class="job ${watch ? "watch" : ""}">
      <div class="job-head">
        <div class="job-title">
          <a href="${escape(j.url)}" target="_blank" rel="noopener">${escape(j.title)}</a>
          ${isNew ? '<span class="job-new">NUEVO</span>' : ""}
        </div>
        <div class="job-src">${escape(j.source)}</div>
      </div>
      <div class="job-meta">${meta}</div>
      ${j.description ? `<div class="job-desc">${escape(j.description)}</div>` : ""}
    </div>`;
}

document.getElementById("q").addEventListener("input", e => { state.q = e.target.value; render(); });
document.getElementById("source").addEventListener("change", e => { state.src = e.target.value; render(); });
document.getElementById("loc").addEventListener("change", e => { state.locMode = e.target.value; render(); });

load();
</script>
</body>
</html>
