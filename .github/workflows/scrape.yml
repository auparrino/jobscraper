name: scrape

on:
  schedule:
    # Twice a day, 10:00 and 22:00 UTC (07:00 and 19:00 ART)
    - cron: "0 10,22 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Space-separated adapter names to run (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.only }}" ]; then
            python -m src.main --only ${{ github.event.inputs.only }}
          else
            python -m src.main
          fi

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: new-jobs-${{ github.run_id }}
          path: |
            data/new_jobs_latest.json
            data/new_jobs_latest.md
          if-no-files-found: ignore

      - name: Commit DB + latest snapshots
        run: |
          git config user.name "jobscraper-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f data/jobs.db data/new_jobs_latest.json data/new_jobs_latest.md || true
          if ! git diff --cached --quiet; then
            git commit -m "scrape: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit."
          fi
